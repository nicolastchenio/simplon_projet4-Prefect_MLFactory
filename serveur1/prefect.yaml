name: docker-compose-prefect-deploy
prefect-version: 3.6.21

build:
- prefect_docker.deployments.steps.build_docker_image:
    id: build_image
    requires: prefect-docker>=0.3.1
    image_name: nico9741975/api_prefect
    tag: latest
    dockerfile: Dockerfile

push:
- prefect_docker.deployments.steps.push_docker_image:
    requires: prefect-docker>=0.3.1
    image_name: '{{ build_image.image_name }}'
    tag: '{{ build_image.tag }}'

pull:
- prefect.deployments.steps.set_working_directory:
    directory: .

deployments:
  - name: "calcul-final-v5"
    entrypoint: "flows/task.py:mon_flow_calcul"
    work_pool:
      name: "docker-pool"
      job_variables:
        image: nico9741975/api_prefect:latest
        # env:
        #   PREFECT_API_URL: http://host.docker.internal:4200/api
    parameters:
      a: 10
      b: 20
    schedule:
      cron: "0 9 * * *"